name: bowtie2_align
description: Filter single-end reads against a Bowtie2 index and emit unmapped reads
keywords:
  - bowtie2
  - filter
  - fastq
  - riboseq
  - depletion
tools:
  - bowtie2:
      description: |
        Bowtie 2 is an ultrafast and memory-efficient tool for aligning
        sequencing reads to long reference sequences.
      homepage: http://bowtie-bio.sourceforge.net/bowtie2/index.shtml
      documentation: http://bowtie-bio.sourceforge.net/bowtie2/manual.shtml
      doi: 10.1186/gb-2009-10-3-r25
      licence: ["GPL-3.0-or-later"]
      identifier: biotools:bowtie2
input:
  - - meta:
        type: map
        description: |
          Groovy Map containing sample information, e.g. [ id:'test', single_end:true ]
    - reads:
        type: file
        description: Single-end input FASTQ file.
        pattern: "*.fastq.gz"
        ontologies:
          - edam: http://edamontology.org/format_3989
  - - meta2:
        type: map
        description: Groovy Map containing reference information, e.g. [ id:'rRNA' ]
    - index:
        type: file
        description: Bowtie2 index directory or files.
        pattern: "*.{bt2,bt2l}"
        ontologies: []
output:
  log:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.log":
          type: file
          description: Bowtie2 alignment log.
          pattern: "*.log"
          ontologies: []
  fastq:
    - - meta:
          type: map
          description: Groovy Map containing sample information
      - "*.unmapped.fastq.gz":
          type: file
          description: Gzipped FASTQ containing reads that did not align to the Bowtie2 index.
          pattern: "*.unmapped.fastq.gz"
          ontologies:
            - edam: http://edamontology.org/format_3989
  versions_bowtie2:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bowtie2:
          type: string
          description: The name of the tool
      - "bowtie2 --version 2>&1 | sed -n 's/.*bowtie2-align-s version //p'":
          type: eval
          description: The expression to obtain the version of bowtie2

topics:
  versions:
    - - ${task.process}:
          type: string
          description: The name of the process
      - bowtie2:
          type: string
          description: The name of the tool
      - "bowtie2 --version 2>&1 | sed -n 's/.*bowtie2-align-s version //p'":
          type: eval
          description: The expression to obtain the version of bowtie2

authors:
  - "@joseespinosa"
  - "@drpatelh"
maintainers:
  - "@joseespinosa"
  - "@drpatelh"
